<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TollyWorld — Модерация</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a2e;
  --border: #2a2a3e;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --accent3: #fd79a8;
  --text: #e8e8f0;
  --text2: #8888a0;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,.4);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* Background effects */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 20% 50%, rgba(108,92,231,.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 50%, rgba(0,206,201,.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  background: rgba(18,18,26,.9);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 800;
  color: #fff;
}
.logo-text {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.server-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  padding: 8px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  font-size: 14px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #00b894;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}
.server-ip {
  color: var(--accent2);
  font-family: 'Courier New', monospace;
  font-weight: 600;
  letter-spacing: .5px;
}

/* Hero */
.hero {
  padding: 60px 0 40px;
  text-align: center;
}
.hero h1 {
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fff, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p {
  color: var(--text2);
  font-size: 18px;
  max-width: 600px;
  margin: 0 auto;
}

/* Upload Section */
.upload-section {
  margin-bottom: 40px;
}
.upload-zone {
  background: var(--surface);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.upload-zone:hover,
.upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(108,92,231,.05);
}
.upload-zone.drag-over {
  border-color: var(--accent2);
  background: rgba(0,206,201,.05);
}
.upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
  display: block;
}
.upload-zone h3 {
  font-size: 20px;
  margin-bottom: 8px;
}
.upload-zone p {
  color: var(--text2);
  font-size: 14px;
}
.upload-hint {
  display: inline-block;
  margin-top: 16px;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s;
  border: none;
}
.upload-hint:hover { transform: scale(1.05); }
.upload-hint:active { transform: scale(.97); }
#videoInput { display: none; }

/* Upload Progress */
.upload-progress {
  display: none;
  margin-top: 16px;
  background: var(--card);
  border-radius: 100px;
  height: 6px;
  overflow: hidden;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}
.upload-progress.active { display: block; }
.upload-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%;
  border-radius: 100px;
  transition: width .3s;
}

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.stat-number {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  padding: 8px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  transition: all .2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.search-input {
  flex: 1;
  min-width: 200px;
  padding: 8px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text2); }

/* Video Grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.video-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .3s;
  position: relative;
}
.video-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 12px 40px rgba(108,92,231,.15);
}
.video-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.video-thumb video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.video-thumb .play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .3s;
}
.video-card:hover .play-overlay { opacity: 1; }
.play-overlay span {
  font-size: 48px;
  color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.video-info {
  padding: 16px;
}
.video-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.video-meta {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text2);
}
.video-meta span { display: flex; align-items: center; gap: 4px; }
.video-date {
  font-size: 11px;
  color: var(--text2);
  margin-top: 6px;
}
.delete-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(253,121,168,.9);
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .3s;
  z-index: 5;
}
.video-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { transform: scale(1.1); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  grid-column: 1 / -1;
}
.empty-state span { font-size: 64px; display: block; margin-bottom: 16px; }
.empty-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }

/* Player Modal */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 200;
  backdrop-filter: blur(10px);
  padding: 24px;
}
.modal.active { display: flex; align-items: center; justify-content: center; }
.modal-content {
  background: var(--surface);
  border-radius: var(--radius);
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  animation: modalIn .3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 {
  font-size: 18px;
  max-width: 80%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.modal-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.modal-close:hover { background: var(--accent3); border-color: var(--accent3); color: #fff; }
.modal-video {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-video video { width: 100%; height: 100%; }
.modal-body { padding: 20px 24px; }
.modal-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
}
.modal-stats button {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 100px;
  transition: all .2s;
}
.modal-stats button:hover { background: var(--card); color: var(--text); }
.modal-stats .liked { color: var(--accent3); }
.modal-date {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 16px;
}

/* Comments */
.comments-section h4 {
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--text2);
}
.comment-input-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.comment-input-wrap input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.comment-input-wrap input:focus { border-color: var(--accent); }
.comment-input-wrap button {
  padding: 10px 20px;
  border-radius: 100px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s;
}
.comment-input-wrap button:hover { transform: scale(1.05); }
.comment-input-wrap button:active { transform: scale(.97); }
.comment-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.comment-item:last-child { border-bottom: none; }
.comment-text { color: var(--text); }
.comment-time {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
}
.comment-delete {
  background: none;
  border: none;
  color: var(--accent3);
  cursor: pointer;
  font-size: 12px;
  margin-left: 8px;
  opacity: .6;
  transition: opacity .2s;
}
.comment-delete:hover { opacity: 1; }

/* Empty comments */
.no-comments {
  text-align: center;
  padding: 20px;
  color: var(--text2);
  font-size: 14px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 24px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  transform: translateY(20px);
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--accent3); }
.toast.success { border-color: var(--accent2); }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 0 16px; }
  .hero h1 { font-size: 28px; }
  .header-inner { flex-direction: column; text-align: center; }
  .server-badge { font-size: 12px; padding: 6px 12px; }
  .video-grid { grid-template-columns: 1fr; }
  .modal { padding: 12px; }
  .modal-content { max-height: 95vh; }
}
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <div class="logo-icon">TW</div>
      <span class="logo-text">TollyWorld</span>
    </div>
    <div class="server-badge">
      <span class="status-dot"></span>
      <span>Онлайн</span>
      <span class="server-ip">TollyWorld.ru-cc.ru</span>
    </div>
  </div>
</header>

<div class="container">

  <section class="hero">
    <h1>Панель модерации</h1>
    <p>Загружайте, просматривайте и управляйте видео сервера TollyWorld</p>
  </section>

  <section class="upload-section">
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">🎬</span>
      <h3>Перетащите видео сюда</h3>
      <p>MP4, WebM, MOV — до 500 МБ</p>
      <button class="upload-hint" id="uploadBtn">Выбрать файл</button>
      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="progressBar"></div>
      </div>
    </div>
    <input type="file" id="videoInput" accept="video/*">
  </section>

  <section class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-number" id="totalVideos">0</div>
      <div class="stat-label">Всего видео</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalLikes">0</div>
      <div class="stat-label">Всего лайков</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalComments">0</div>
      <div class="stat-label">Комментариев</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalSize">0 MB</div>
      <div class="stat-label">Общий размер</div>
    </div>
  </section>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="newest">Сначала новые</button>
    <button class="filter-btn" data-filter="oldest">Сначала старые</button>
    <button class="filter-btn" data-filter="most-liked">По лайкам</button>
    <input type="text" class="search-input" id="searchInput" placeholder="Поиск видео...">
  </div>

  <div class="video-grid" id="videoGrid"></div>

</div>

<!-- Player Modal -->
<div class="modal" id="playerModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Видео</h2>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="modal-video" id="modalVideoContainer"></div>
    <div class="modal-body">
      <div class="modal-stats">
        <button id="likeBtn">❤ <span id="likeCount">0</span></button>
        <button id="commentCountBtn">💬 <span id="commentCount">0</span></button>
      </div>
      <div class="modal-date" id="modalDate"></div>
      <div class="comments-section">
        <h4>Комментарии</h4>
        <div class="comment-input-wrap">
          <input type="text" id="commentInput" placeholder="Написать комментарий..." maxlength="500">
          <button id="sendComment">Отправить</button>
        </div>
        <div id="commentsList"></div>
      </div>
    </div>
  </div>
</div>

  <!-- Confirm Modal -->
  <div class="modal" id="confirmModal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Подтверждение</h2>
      </div>
      <div class="modal-body" style="text-align: center; padding: 32px 24px;">
        <span style="font-size: 48px; display: block; margin-bottom: 16px;">⚠️</span>
        <p style="font-size: 18px; margin-bottom: 24px;" id="confirmText">Вы уверены?</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="upload-hint" style="background: var(--card); color: var(--text);" id="confirmCancel">Отмена</button>
          <button class="upload-hint" style="background: var(--accent3);" id="confirmOk">Удалить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const DB_NAME = 'TollyWorldVideos';
const DB_VERSION = 1;
const STORE_NAME = 'videos';
const META_KEY = 'tw_video_meta';

let db = null;
let currentVideoId = null;
let videosCache = [];

// IndexedDB
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// Meta helpers
function getMeta() {
  try {
    return JSON.parse(localStorage.getItem(META_KEY)) || {};
  } catch { return {}; }
}
function saveMeta(meta) {
  localStorage.setItem(META_KEY, JSON.stringify(meta));
}
function initMeta(id) {
  const meta = getMeta();
  if (!meta[id]) {
    meta[id] = { likes: 0, liked: false, comments: [], date: new Date().toISOString() };
    saveMeta(meta);
  }
  return meta;
}

// Store video in IndexedDB
async function storeVideo(id, blob) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put({ id, data: blob });
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

// Get video from IndexedDB
async function getVideo(id) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(id);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// Delete video from IndexedDB
async function deleteVideoFromDB(id) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

// Get all video keys from IndexedDB
async function getAllVideoKeys() {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAllKeys();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// Get total size of all videos
async function getTotalSize() {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = e => {
      const items = e.target.result;
      let total = 0;
      for (const item of items) {
        total += item.data instanceof Blob ? item.data.size : item.data.byteLength || 0;
      }
      resolve(total);
    };
    req.onerror = e => reject(e.target.error);
  });
}

// Load all videos
async function loadVideos() {
  const keys = await getAllVideoKeys();
  const meta = getMeta();
  const videos = [];
  for (const id of keys) {
    const m = meta[id];
    if (m) {
      videos.push({ id, ...m });
    } else {
      initMeta(id);
      videos.push({ id, likes: 0, liked: false, comments: [], date: new Date().toISOString() });
    }
  }
  videos.sort((a, b) => new Date(b.date) - new Date(a.date));
  videosCache = videos;
  return videos;
}

// Render video grid
function renderVideos(videos) {
  const grid = document.getElementById('videoGrid');
  if (videos.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span>📹</span>
        <h3>Видео пока нет</h3>
        <p>Загрузите первое видео через форму выше</p>
      </div>`;
    return;
  }
  grid.innerHTML = videos.map(v => {
    const date = new Date(v.date);
    const dateStr = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="video-card" data-id="${v.id}">
        <button class="delete-btn" onclick="event.stopPropagation(); deleteVideo('${v.id}')">✕</button>
        <div class="video-thumb">
          <video preload="metadata" muted src=""></video>
          <div class="play-overlay"><span>▶</span></div>
        </div>
        <div class="video-info">
          <div class="video-title">${escHtml(v.title || 'Без названия')}</div>
          <div class="video-meta">
            <span>❤ ${v.likes}</span>
            <span>💬 ${v.comments.length}</span>
          </div>
          <div class="video-date">${dateStr} в ${timeStr}</div>
        </div>
      </div>
    `;
  }).join('');

  // Set video sources and click handlers
  for (const card of grid.querySelectorAll('.video-card')) {
    const id = card.dataset.id;
    const videoEl = card.querySelector('video');
    getVideo(id).then(entry => {
      if (entry && videoEl) {
        const blob = entry.data instanceof Blob ? entry.data : new Blob([entry.data]);
        videoEl.src = URL.createObjectURL(blob);
      }
    }).catch(() => {});
    card.addEventListener('click', () => openPlayer(id));
  }
}

// Update stats
async function updateStats() {
  const meta = getMeta();
  const videos = await loadVideos();
  let totalLikes = 0;
  let totalComments = 0;
  for (const v of videos) {
    totalLikes += v.likes;
    totalComments += v.comments.length;
  }
  const totalBytes = await getTotalSize();
  const totalMB = (totalBytes / (1024 * 1024)).toFixed(1);

  document.getElementById('totalVideos').textContent = videos.length;
  document.getElementById('totalLikes').textContent = totalLikes;
  document.getElementById('totalComments').textContent = totalComments;
  document.getElementById('totalSize').textContent = totalMB + ' MB';
}

// Open player
async function openPlayer(id) {
  currentVideoId = id;
  const meta = getMeta();
  const v = meta[id];
  if (!v) return;

  document.getElementById('modalTitle').textContent = v.title || 'Без названия';
  document.getElementById('likeCount').textContent = v.likes;
  document.getElementById('commentCount').textContent = v.comments.length;
  document.getElementById('modalDate').textContent = new Date(v.date).toLocaleString('ru-RU');

  const likeBtn = document.getElementById('likeBtn');
  likeBtn.innerHTML = (v.liked ? '❤️ ' : '❤ ') + '<span id="likeCount">' + v.likes + '</span>';
  likeBtn.className = v.liked ? 'liked' : '';

  // Load video
  const container = document.getElementById('modalVideoContainer');
  container.innerHTML = '<video controls autoplay style="width:100%;height:100%"></video>';
  const videoEl = container.querySelector('video');
  try {
    const entry = await getVideo(id);
    if (entry) {
      const blob = entry.data instanceof Blob ? entry.data : new Blob([entry.data]);
      videoEl.src = URL.createObjectURL(blob);
    }
  } catch(e) { console.error(e); }

  renderComments(id);

  document.getElementById('playerModal').classList.add('active');
}

// Render comments
function renderComments(id) {
  const meta = getMeta();
  const v = meta[id];
  const list = document.getElementById('commentsList');
  if (!v || v.comments.length === 0) {
    list.innerHTML = '<div class="no-comments">Комментариев пока нет</div>';
    return;
  }
  list.innerHTML = v.comments.map((c, i) => `
    <div class="comment-item">
      <div class="comment-text">${escHtml(c.text)}</div>
      <div class="comment-time">${new Date(c.date).toLocaleString('ru-RU')}
        <button class="comment-delete" onclick="deleteComment('${id}', ${i})">удалить</button>
      </div>
    </div>
  `).join('');
}

// Like
document.getElementById('likeBtn').addEventListener('click', () => {
  if (!currentVideoId) return;
  const meta = getMeta();
  const v = meta[currentVideoId];
  if (!v) return;
  v.liked = !v.liked;
  v.likes += v.liked ? 1 : -1;
  if (v.likes < 0) v.likes = 0;
  saveMeta(meta);
  document.getElementById('likeCount').textContent = v.likes;
  const btn = document.getElementById('likeBtn');
  btn.innerHTML = (v.liked ? '❤️ ' : '❤ ') + '<span id="likeCount">' + v.likes + '</span>';
  btn.className = v.liked ? 'liked' : '';
  updateStats();
});

// Send comment
document.getElementById('sendComment').addEventListener('click', () => {
  if (!currentVideoId) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  const meta = getMeta();
  const v = meta[currentVideoId];
  if (!v) return;
  v.comments.push({ text, date: new Date().toISOString() });
  saveMeta(meta);
  input.value = '';
  document.getElementById('commentCount').textContent = v.comments.length;
  renderComments(currentVideoId);
  updateStats();
});

document.getElementById('commentInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('sendComment').click();
});

// Delete comment
function deleteComment(videoId, index) {
  const meta = getMeta();
  const v = meta[videoId];
  if (!v) return;
  v.comments.splice(index, 1);
  saveMeta(meta);
  document.getElementById('commentCount').textContent = v.comments.length;
  renderComments(videoId);
  updateStats();
}

// Close modal
document.getElementById('closeModal').addEventListener('click', () => {
  document.getElementById('playerModal').classList.remove('active');
  document.getElementById('modalVideoContainer').innerHTML = '';
  currentVideoId = null;
});

document.getElementById('playerModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('closeModal').click();
  }
});

// Confirm modal
let pendingDeleteId = null;

function showConfirm(id) {
  pendingDeleteId = id;
  document.getElementById('confirmModal').classList.add('active');
}

document.getElementById('confirmOk').addEventListener('click', async () => {
  if (!pendingDeleteId) return;
  document.getElementById('confirmModal').classList.remove('active');
  const id = pendingDeleteId;
  pendingDeleteId = null;
  try {
    await deleteVideoFromDB(id);
    const meta = getMeta();
    delete meta[id];
    saveMeta(meta);
    showToast('Видео удалено', 'success');
    await refresh();
  } catch(e) {
    showToast('Ошибка удаления', 'error');
  }
});

document.getElementById('confirmCancel').addEventListener('click', () => {
  document.getElementById('confirmModal').classList.remove('active');
  pendingDeleteId = null;
});

document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('confirmCancel').click();
  }
});

// Delete video
async function deleteVideo(id) {
  showConfirm(id);
}

// Upload
async function handleFile(file) {
  if (!file.type.startsWith('video/')) {
    showToast('Пожалуйста, выберите видеофайл', 'error');
    return;
  }
  if (file.size > 500 * 1024 * 1024) {
    showToast('Файл слишком большой (макс. 500 МБ)', 'error');
    return;
  }

  const id = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const name = file.name.replace(/\.[^/.]+$/, '').trim() || 'Без названия';

  showProgress();

  try {
    const blob = file;
    const reader = new FileReader();
    reader.onprogress = e => {
      if (e.lengthComputable) {
        setProgress(Math.round(e.loaded / e.total * 100));
      }
    };
    reader.onload = async () => {
      await storeVideo(id, blob);
      initMeta(id);
      const meta = getMeta();
      meta[id].title = name;
      saveMeta(meta);
      hideProgress();
      showToast('Видео загружено!', 'success');
      await refresh();
    };
    reader.onerror = () => {
      hideProgress();
      showToast('Ошибка чтения файла', 'error');
    };
    reader.readAsArrayBuffer(file);
  } catch(e) {
    hideProgress();
    showToast('Ошибка загрузки', 'error');
  }
}

// Progress
function showProgress() {
  const el = document.getElementById('uploadProgress');
  el.classList.add('active');
  document.getElementById('progressBar').style.width = '0%';
}
function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}
function hideProgress() {
  document.getElementById('uploadProgress').classList.remove('active');
}

// Toast
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}

// EscHtml
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Refresh
async function refresh() {
  const filter = document.querySelector('.filter-btn.active');
  const sortBy = filter ? filter.dataset.filter : 'all';
  const query = document.getElementById('searchInput').value.toLowerCase();
  let videos = await loadVideos();

  // Search
  if (query) {
    videos = videos.filter(v => (v.title || '').toLowerCase().includes(query));
  }

  // Sort
  if (sortBy === 'newest') {
    videos.sort((a, b) => new Date(b.date) - new Date(a.date));
  } else if (sortBy === 'oldest') {
    videos.sort((a, b) => new Date(a.date) - new Date(b.date));
  } else if (sortBy === 'most-liked') {
    videos.sort((a, b) => b.likes - a.likes);
  }

  renderVideos(videos);
  updateStats();
}

// Upload zone events
const zone = document.getElementById('uploadZone');
const input = document.getElementById('videoInput');

zone.addEventListener('click', () => input.click());
document.getElementById('uploadBtn').addEventListener('click', e => {
  e.stopPropagation();
  input.click();
});
input.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
  e.target.value = '';
});

zone.addEventListener('dragover', e => {
  e.preventDefault();
  zone.classList.add('drag-over');
});
zone.addEventListener('dragleave', () => {
  zone.classList.remove('drag-over');
});
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    refresh();
  });
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(refresh, 300);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('playerModal').classList.contains('active')) {
      document.getElementById('closeModal').click();
    }
    if (document.getElementById('confirmModal').classList.contains('active')) {
      document.getElementById('confirmCancel').click();
    }
  }
});

// Init
(async function init() {
  await openDB();
  await refresh();
})();
</script>
